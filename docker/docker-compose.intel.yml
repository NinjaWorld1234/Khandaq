###############################################################################
# SOC Platform — Ephemeral Global Threat Intelligence Bubble
# مركز العمليات الأمنية — فقاعة الاستخبارات المؤقتة ذات التدمير الذاتي
#
# Services: intel-fetcher (cron-like ephemeral container)
#
# Usage:
#   docker compose -f docker-compose.intel.yml --env-file ../.env up 
#   (Notice no -d, this is meant to run and exit, or you can use cron)
###############################################################################

version: "3.8"

services:
  # ===========================================================================
  # Intel Fetcher Bubble — Wakes up, fetches JSON feeds, and commits suicide.
  # فقاعة الجلب المؤقتة — تستيقظ لجلب الفيروسات، تضعها في مجلد معزول، ثم تنتحر.
  # ===========================================================================
  intel-fetcher:
    image: python:3.11-alpine
    container_name: soc-intel-bubble
    hostname: intel-bubble
    # Important: restart must be "no" so it dies gracefully
    restart: "no"
    command: python /app/intel_fetcher.py
    environment:
      - INTEL_DATA_DIR=/data/intel_feeds
    volumes:
      - ./intel/intel_fetcher.py:/app/intel_fetcher.py:ro
      - soc-intel-data:/data/intel_feeds
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 128m

# =============================================================================
# Volumes — Persistent storage shared with AI Agents
# =============================================================================
volumes:
  soc-intel-data:
    driver: local
    name: soc-intel-data

# =============================================================================
# Networks — Shared SOC network
# =============================================================================
networks:
  soc-net:
    external: true
    name: soc-net
