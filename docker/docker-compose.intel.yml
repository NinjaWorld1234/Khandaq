###############################################################################
# SOC Platform — Threat Intelligence & Incident Response Services
# مركز العمليات الأمنية — خدمات استخبارات التهديدات والاستجابة للحوادث
#
# Services: MISP, OpenCTI (+ Redis, Elasticsearch, RabbitMQ, Worker,
#           Connector-MISP), IntelOwl, DFIR-IRIS, Shuffle (SOAR)
#
# Usage:
#   docker compose -f docker-compose.intel.yml --env-file ../.env up -d
###############################################################################

version: "3.8"

services:
  # ===========================================================================
  # MISP — Malware Information Sharing Platform
  # منصة مشاركة معلومات البرمجيات الخبيثة
  # ===========================================================================
  misp:
    image: coolacid/misp-docker:core-latest
    container_name: soc-misp
    hostname: misp
    restart: unless-stopped
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MYSQL_MISP_PASSWORD:-Ch@ngeMe_MISP_MySQL_2024!}
      - MISP_ADMIN_EMAIL=${MISP_ADMIN_EMAIL:-admin@admin.test}
      - MISP_ADMIN_PASSPHRASE=${MISP_ADMIN_PASSWORD:-Ch@ngeMe_MISP_2024!}
      - MISP_BASEURL=${MISP_BASEURL:-https://localhost:8443}
      - TIMEZONE=${TZ:-Asia/Riyadh}
    volumes:
      - misp-data:/var/www/MISP
    ports:
      - "${MISP_PORT:-8443}:443"
    networks:
      - soc-net
    depends_on:
      misp-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sfk https://localhost:443/users/login || exit 1",
        ]
      interval: 60s
      timeout: 15s
      retries: 10
      start_period: 180s

  # MISP MySQL Database / قاعدة بيانات MISP
  misp-db:
    image: mysql:8.0
    container_name: soc-misp-db
    hostname: misp-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MYSQL_MISP_PASSWORD:-Ch@ngeMe_MISP_MySQL_2024!}
      - MYSQL_ROOT_PASSWORD=${MYSQL_MISP_PASSWORD:-Ch@ngeMe_MISP_MySQL_2024!}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "misp",
          "-p${MYSQL_MISP_PASSWORD:-Ch@ngeMe_MISP_MySQL_2024!}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # OpenCTI — Open Cyber Threat Intelligence Platform
  # منصة استخبارات التهديدات السيبرانية المفتوحة
  # ===========================================================================

  # --- OpenCTI Dependencies ---

  # Redis for OpenCTI (separate instance)
  redis-opencti:
    image: redis:7-alpine
    container_name: soc-redis-opencti
    hostname: redis-opencti
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-opencti-data:/data
    ports:
      - "${REDIS_OPENCTI_PORT:-6380}:6379"
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Elasticsearch for OpenCTI (separate from main OpenSearch)
  elasticsearch-opencti:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: soc-elasticsearch-opencti
    hostname: elasticsearch-opencti
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - elasticsearch-opencti-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_OPENCTI_PORT:-9210}:9200"
    networks:
      - soc-net
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # RabbitMQ for OpenCTI
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: soc-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-opencti}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-Ch@ngeMe_RabbitMQ_2024!}
      - RABBITMQ_NODENAME=rabbit@rabbitmq
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # --- OpenCTI Platform ---
  opencti:
    image: opencti/platform:${OPENCTI_VERSION:-6.3.0}
    container_name: soc-opencti
    hostname: opencti
    restart: unless-stopped
    environment:
      - NODE_OPTIONS=--max-old-space-size=8096
      - APP__PORT=8080
      - APP__BASE_URL=http://${HOST_IP:-localhost}:${OPENCTI_PORT:-8080}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL:-admin@opencti.io}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD:-Ch@ngeMe_OpenCTI_2024!}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN:-changeme-opencti-admin-token-uuid-here}
      - APP__APP_LOGS__LOGS_LEVEL=error
      - APP__HEALTH_ACCESS_KEY=${OPENCTI_HEALTHCHECK_KEY:-changeme-healthcheck-key}
      # Redis
      - REDIS__HOSTNAME=redis-opencti
      - REDIS__PORT=6379
      # Elasticsearch
      - ELASTICSEARCH__URL=http://elasticsearch-opencti:9200
      # RabbitMQ
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__PORT_MANAGEMENT=15672
      - RABBITMQ__MANAGEMENT_SSL=false
      - RABBITMQ__USERNAME=${RABBITMQ_DEFAULT_USER:-opencti}
      - RABBITMQ__PASSWORD=${RABBITMQ_DEFAULT_PASS:-Ch@ngeMe_RabbitMQ_2024!}
    volumes:
      - opencti-data:/opt/opencti/data
    ports:
      - "${OPENCTI_PORT:-8080}:8080"
    networks:
      - soc-net
    depends_on:
      redis-opencti:
        condition: service_healthy
      elasticsearch-opencti:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8080/health?health_access_key=${OPENCTI_HEALTHCHECK_KEY:-changeme-healthcheck-key} || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s

  # OpenCTI Worker — Background task processor
  opencti-worker:
    image: opencti/worker:${OPENCTI_VERSION:-6.3.0}
    container_name: soc-opencti-worker
    hostname: opencti-worker
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN:-changeme-opencti-admin-token-uuid-here}
      - WORKER_LOG_LEVEL=info
    networks:
      - soc-net
    depends_on:
      opencti:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
      replicas: 3

  # OpenCTI MISP Connector — Imports from MISP into OpenCTI
  opencti-connector-misp:
    image: opencti/connector-misp:${OPENCTI_VERSION:-6.3.0}
    container_name: soc-opencti-connector-misp
    hostname: opencti-connector-misp
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN:-changeme-opencti-admin-token-uuid-here}
      - CONNECTOR_ID=connector-misp-001
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=MISP
      - CONNECTOR_SCOPE=misp
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_DURATION_PERIOD=PT5M
      - MISP_URL=https://misp:443
      - MISP_REFERENCE_URL=${MISP_BASEURL:-https://localhost:8443}
      - MISP_KEY=CHANGEME_MISP_AUTOMATION_KEY
      - MISP_SSL_VERIFY=false
      - MISP_DATETIME_ATTRIBUTE=timestamp
      - MISP_CREATE_REPORTS=true
      - MISP_CREATE_INDICATORS=true
      - MISP_CREATE_OBSERVABLES=true
      - MISP_CREATE_OBJECT_OBSERVABLES=true
      - MISP_REPORT_TYPE=misp-event
      - MISP_IMPORT_FROM_DATE=2020-01-01
      - MISP_IMPORT_TAGS=tlp:white,tlp:green,tlp:amber
      - MISP_IMPORT_TAGS_NOT=
      - MISP_IMPORT_CREATOR_ORGS=
      - MISP_IMPORT_CREATOR_ORGS_NOT=
      - MISP_IMPORT_KEYWORD=
      - MISP_INTERVAL=5
    networks:
      - soc-net
    depends_on:
      opencti:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  # ===========================================================================
  # IntelOwl — Threat intelligence automation
  # إنتل أول — أتمتة استخبارات التهديدات
  # ===========================================================================
  intelowl:
    image: intelowlproject/intelowl:latest
    container_name: soc-intelowl
    hostname: intelowl
    restart: unless-stopped
    environment:
      - DJANGO_SECRET=changeme-intelowl-secret-key
      - DB_HOST=intelowl-db
      - DB_PORT=5432
      - DB_USER=intelowl
      - DB_PASSWORD=Ch@ngeMe_IntelOwl_DB_2024!
      - DB_NAME=intelowl
    volumes:
      - intelowl-data:/opt/deploy/intel_owl/data
    ports:
      - "${INTELOWL_PORT:-8085}:80"
    networks:
      - soc-net
    depends_on:
      intelowl-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:80/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # IntelOwl PostgreSQL Database
  intelowl-db:
    image: postgres:16-alpine
    container_name: soc-intelowl-db
    hostname: intelowl-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=intelowl
      - POSTGRES_USER=intelowl
      - POSTGRES_PASSWORD=Ch@ngeMe_IntelOwl_DB_2024!
    volumes:
      - intelowl-db-data:/var/lib/postgresql/data
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelowl"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # DFIR-IRIS — Incident Response case management
  # إدارة حالات الاستجابة للحوادث
  # ===========================================================================
  dfir-iris:
    image: ghcr.io/dfir-iris/iriswebapp:latest
    container_name: soc-dfir-iris
    hostname: dfir-iris
    restart: unless-stopped
    environment:
      - IRIS_SECRET_KEY=${IRIS_SECRET_KEY:-changeme-iris-secret-key-random-string}
      - IRIS_ADMIN_PASSWORD=${IRIS_ADMIN_PASSWORD:-Ch@ngeMe_IRIS_2024!}
      - DB_HOST=iris-db
      - DB_PORT=5432
      - DB_NAME=iris
      - DB_USER=iris
      - DB_PASS=Ch@ngeMe_IRIS_DB_2024!
    volumes:
      - iris-data:/opt/iris/data
      - iris-uploads:/opt/iris/uploads
    ports:
      - "${IRIS_PORT:-4433}:443"
    networks:
      - soc-net
    depends_on:
      iris-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sfk https://localhost:443/api/versions || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # DFIR-IRIS PostgreSQL Database
  iris-db:
    image: postgres:16-alpine
    container_name: soc-iris-db
    hostname: iris-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=iris
      - POSTGRES_USER=iris
      - POSTGRES_PASSWORD=Ch@ngeMe_IRIS_DB_2024!
    volumes:
      - iris-db-data:/var/lib/postgresql/data
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Shuffle — Security Orchestration, Automation and Response (SOAR)
  # شافل — تنسيق وأتمتة واستجابة أمنية
  # ===========================================================================
  shuffle-backend:
    image: shuffleproject/shuffle-backend:latest
    container_name: soc-shuffle-backend
    hostname: shuffle-backend
    restart: unless-stopped
    environment:
      - SHUFFLE_APP_HOTLOAD_FOLDER=${SHUFFLE_APP_HOTLOAD_FOLDER:-/shuffle-apps}
      - SHUFFLE_FILE_LOCATION=${SHUFFLE_FILE_LOCATION:-/shuffle-files}
      - SHUFFLE_OPENSEARCH_URL=http://opensearch-node1:9200
      - SHUFFLE_DEFAULT_USERNAME=admin
      - SHUFFLE_DEFAULT_APIKEY=changeme-shuffle-api-key
      - BACKEND_HOSTNAME=shuffle-backend
      - BACKEND_PORT=5001
      - OUTER_HOSTNAME=${HOST_IP:-localhost}
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shuffle-apps:/shuffle-apps
      - shuffle-files:/shuffle-files
    ports:
      - "${SHUFFLE_BACKEND_PORT:-5001}:5001"
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:5001/api/v1/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  shuffle-frontend:
    image: shuffleproject/shuffle-frontend:latest
    container_name: soc-shuffle-frontend
    hostname: shuffle-frontend
    restart: unless-stopped
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
      - BACKEND_PORT=5001
    ports:
      - "${SHUFFLE_FRONTEND_PORT:-3001}:80"
    networks:
      - soc-net
    depends_on:
      shuffle-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:80 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  shuffle-orborus:
    image: shuffleproject/shuffle-orborus:latest
    container_name: soc-shuffle-orborus
    hostname: shuffle-orborus
    restart: unless-stopped
    environment:
      - SHUFFLE_WORKER_VERSION=latest
      - BASE_URL=http://shuffle-backend:5001
      - DOCKER_API_VERSION=1.40
      - SHUFFLE_BASE_IMAGE_NAME=shuffleproject
      - SHUFFLE_APP_SDK_VERSION=latest
      - ENVIRONMENT_NAME=soc-shuffle
      - ORG_ID=soc-org
      - CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - soc-net
    depends_on:
      shuffle-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

# =============================================================================
# Volumes — Persistent storage
# وحدات التخزين — التخزين الدائم
# =============================================================================
volumes:
  misp-data:
    driver: local
    name: soc-misp-data
  misp-db-data:
    driver: local
    name: soc-misp-db-data
  redis-opencti-data:
    driver: local
    name: soc-redis-opencti-data
  elasticsearch-opencti-data:
    driver: local
    name: soc-elasticsearch-opencti-data
  rabbitmq-data:
    driver: local
    name: soc-rabbitmq-data
  opencti-data:
    driver: local
    name: soc-opencti-data
  intelowl-data:
    driver: local
    name: soc-intelowl-data
  intelowl-db-data:
    driver: local
    name: soc-intelowl-db-data
  iris-data:
    driver: local
    name: soc-iris-data
  iris-uploads:
    driver: local
    name: soc-iris-uploads
  iris-db-data:
    driver: local
    name: soc-iris-db-data
  shuffle-apps:
    driver: local
    name: soc-shuffle-apps
  shuffle-files:
    driver: local
    name: soc-shuffle-files

# =============================================================================
# Networks — Shared SOC network
# الشبكات — شبكة مركز العمليات المشتركة
# =============================================================================
networks:
  soc-net:
    external: true
    name: soc-net
