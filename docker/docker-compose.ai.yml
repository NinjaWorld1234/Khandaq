###############################################################################
# SOC Platform — AI Agents Infrastructure
# مركز العمليات الأمنية — بنية وكلاء الذكاء الاصطناعي
#
# Services: Ollama (Local LLMs), Redis (Message Queue), AI Agents
#
# Usage:
#   docker compose -f docker-compose.ai.yml --env-file ../.env up -d
#
# Prerequisites:
#   - NVIDIA Container Toolkit for GPU passthrough
#   - agents/Dockerfile must exist for the ai-agents service
###############################################################################

version: "3.8"

services:
  # ===========================================================================
  # vLLM Commander — Serving Kimi K2.6-Mini
  # محرك القيادة — تشغيل نموذج كيمي للقائد
  # ===========================================================================
  vllm-commander:
    image: vllm/vllm-openai:latest
    container_name: soc-vllm-commander
    hostname: vllm-commander
    restart: unless-stopped
    command: --model "MoonshotAI/Kimi-K2.6-Mini" --port 8000 --max-model-len 32768 --gpu-memory-utilization 0.9 --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - vllm-models:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - soc-net
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # vLLM Workers — Serving WhiteRabbitNeo
  # محرك العمال — تشغيل نموذج الأرنب الأبيض
  # ===========================================================================
  vllm-workers:
    image: vllm/vllm-openai:latest
    container_name: soc-vllm-workers
    hostname: vllm-workers
    restart: unless-stopped
    command: --model "WhiteRabbitNeo/WhiteRabbitNeo-13B-v1" --port 8001 --max-model-len 16384 --gpu-memory-utilization 0.9
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - vllm-models:/root/.cache/huggingface
    ports:
      - "8001:8001"
    networks:
      - soc-net
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # Redis Primary — Message queue for AI agent communication
  # ريديس الأساسي — قائمة رسائل لتواصل وكلاء الذكاء الاصطناعي
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: soc-redis-ai-primary
    hostname: redis-ai
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-ai-data:/data
    ports:
      - "${REDIS_AI_PORT:-6379}:6379"
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}",
          "ping",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Redis Replica — High Availability for Message queue
  # ريديس الاحتياطي — لضمان استمرارية التواصل بين الوكلاء إذا سقط الأساسي
  # ===========================================================================
  redis-replica:
    image: redis:7-alpine
    container_name: soc-redis-ai-replica
    hostname: redis-ai-replica
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}
      --masterauth ${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}
      --replicaof redis-ai 6379
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-ai-replica-data:/data
    networks:
      - soc-net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

  # ===========================================================================
  # AI Agents — Custom SOC AI agents (52 agents)
  # وكلاء الذكاء الاصطناعي — وكلاء ذكاء اصطناعي مخصصون (52 وكيل)
  # ===========================================================================
  ai-agents:
    build:
      context: ../agents
      dockerfile: Dockerfile
    image: soc-ai-agents:latest
    container_name: soc-ai-agents
    hostname: ai-agents
    restart: unless-stopped
    environment:
      # vLLM connection / اتصال محركات الذكاء المتعددة
      - VLLM_COMMANDER_URL=http://vllm-commander:8000/v1
      - VLLM_COMMANDER_MODEL=MoonshotAI/Kimi-K2.6-Mini
      - VLLM_WORKER_URL=http://vllm-workers:8001/v1
      - VLLM_WORKER_MODEL=WhiteRabbitNeo/WhiteRabbitNeo-13B-v1
      # Redis connection / اتصال ريديس
      - REDIS_HOST=redis-ai
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}
      # OpenSearch connection / اتصال محرك البحث
      - OPENSEARCH_HOSTS=["https://opensearch-node1:9200"]
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-admin}
      # Wazuh API connection / اتصال واجهة وازه
      - WAZUH_API_URL=https://wazuh-manager:55000
      - WAZUH_API_USER=${WAZUH_API_USER:-wazuh-wui}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD:-Ch@ngeMe_Wazuh_API_2024!}
      # Threat Intel & SOAR / الاستخبارات والأتمتة
      - MISP_API_KEY=${MISP_API_KEY:-}
      - IRIS_API_KEY=${IRIS_API_KEY:-}
      # Alerting / التنبيهات الخارجية
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Agent configuration / إعدادات الوكلاء
      - LOG_LEVEL=${AI_AGENTS_LOG_LEVEL:-INFO}
      - WORKERS=${AI_AGENTS_WORKERS:-4}
      - TZ=${TZ:-Asia/Riyadh}
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface
    volumes:
      - ai-agents-data:/app/data
      - ai-agents-logs:/app/logs
      - ai-agents-hf-cache:/app/.cache/huggingface
      - soc-intel-data:/app/data/intel_feeds:ro
      - ../soc_models:/app/models
    networks:
      - soc-net
    depends_on:
      vllm-commander:
        condition: service_healthy
      vllm-workers:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# =============================================================================
# Volumes — Persistent storage
# وحدات التخزين — التخزين الدائم
# =============================================================================
volumes:
  vllm-models:
    driver: local
    name: soc-vllm-models
  redis-ai-data:
    driver: local
    name: soc-redis-ai-data
  redis-ai-replica-data:
    driver: local
    name: soc-redis-ai-replica-data
  ai-agents-data:
    driver: local
    name: soc-ai-agents-data
  ai-agents-logs:
    driver: local
    name: soc-ai-agents-logs
  ai-agents-hf-cache:
    driver: local
    name: soc-ai-agents-hf-cache
  soc-intel-data:
    external: true
    name: soc-intel-data

# =============================================================================
# Networks — Shared SOC network
# الشبكات — شبكة مركز العمليات المشتركة
# =============================================================================
networks:
  soc-net:
    external: true
    name: soc-net
