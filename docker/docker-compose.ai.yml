###############################################################################
# SOC Platform — AI Agents Infrastructure
# مركز العمليات الأمنية — بنية وكلاء الذكاء الاصطناعي
#
# Services: Ollama (Local LLMs), Redis (Message Queue), AI Agents
#
# Usage:
#   docker compose -f docker-compose.ai.yml --env-file ../.env up -d
#
# Prerequisites:
#   - NVIDIA Container Toolkit for GPU passthrough
#   - agents/Dockerfile must exist for the ai-agents service
###############################################################################

version: "3.8"

services:
  # ===========================================================================
  # Ollama — Local LLM inference server
  # أولاما — خادم استدلال نماذج اللغة المحلية
  # ===========================================================================
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-0.3.1}
    container_name: soc-ollama
    hostname: ollama
    restart: unless-stopped
    # GPU passthrough via NVIDIA Container Toolkit
    # تمرير وحدة معالجة الرسوميات عبر أدوات NVIDIA
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-8g}
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    networks:
      - soc-net
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:11434/api/tags || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # Redis — Message queue for AI agent communication
  # ريديس — قائمة رسائل لتواصل وكلاء الذكاء الاصطناعي
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: soc-redis-ai
    hostname: redis-ai
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-ai-data:/data
    ports:
      - "${REDIS_AI_PORT:-6379}:6379"
    networks:
      - soc-net
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}",
          "ping",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # AI Agents — Custom SOC AI agents (52 agents)
  # وكلاء الذكاء الاصطناعي — وكلاء ذكاء اصطناعي مخصصون (52 وكيل)
  # ===========================================================================
  ai-agents:
    build:
      context: ../agents
      dockerfile: Dockerfile
    image: soc-ai-agents:latest
    container_name: soc-ai-agents
    hostname: ai-agents
    restart: unless-stopped
    environment:
      # Ollama connection / اتصال أولاما
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${AI_AGENTS_OLLAMA_MODEL:-mistral}
      # Redis connection / اتصال ريديس
      - REDIS_HOST=redis-ai
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_AI_PASSWORD:-Ch@ngeMe_Redis_AI_2024!}
      # OpenSearch connection / اتصال محرك البحث
      - OPENSEARCH_HOST=opensearch-node1
      - OPENSEARCH_PORT=9200
      # Wazuh API connection / اتصال واجهة وازه
      - WAZUH_API_URL=https://wazuh-manager:55000
      - WAZUH_API_USER=${WAZUH_API_USER:-wazuh-wui}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD:-Ch@ngeMe_Wazuh_API_2024!}
      # MISP connection / اتصال منصة مشاركة المعلومات
      - MISP_URL=https://misp:443
      # Agent configuration / إعدادات الوكلاء
      - LOG_LEVEL=${AI_AGENTS_LOG_LEVEL:-INFO}
      - WORKERS=${AI_AGENTS_WORKERS:-4}
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ai-agents-data:/app/data
      - ai-agents-logs:/app/logs
    networks:
      - soc-net
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# =============================================================================
# Volumes — Persistent storage
# وحدات التخزين — التخزين الدائم
# =============================================================================
volumes:
  ollama-models:
    driver: local
    name: soc-ollama-models
  redis-ai-data:
    driver: local
    name: soc-redis-ai-data
  ai-agents-data:
    driver: local
    name: soc-ai-agents-data
  ai-agents-logs:
    driver: local
    name: soc-ai-agents-logs

# =============================================================================
# Networks — Shared SOC network
# الشبكات — شبكة مركز العمليات المشتركة
# =============================================================================
networks:
  soc-net:
    external: true
    name: soc-net
