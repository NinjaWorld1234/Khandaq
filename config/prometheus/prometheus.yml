global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    # Container metrics (we can add cadvisor to docker-compose later if needed, but for now we expect it here)
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'vllm'
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm-commander:8000', 'vllm-worker:8001']
