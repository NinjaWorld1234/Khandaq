api:
  enabled: true
  address: "0.0.0.0:8686"

sources:
  suricata_logs:
    type: file
    include:
      - /var/log/suricata/eve.json
    read_from: beginning

  zeek_logs:
    type: file
    include:
      - /opt/zeek/logs/current/*.log
    read_from: beginning

transforms:
  parse_suricata:
    type: remap
    inputs:
      - suricata_logs
    source: |
      . = parse_json!(.message)
      .source = "suricata"

  parse_zeek:
    type: remap
    inputs:
      - zeek_logs
    source: |
      . = parse_json!(.message)
      .source = "zeek"
      # Extract Zeek log type (e.g., 'dns', 'conn', 'http') from _path if available
      .zeek_type = ._path ?? "unknown"

sinks:
  kafka_suricata:
    type: kafka
    inputs:
      - parse_suricata
    bootstrap_servers: "kafka:29092"
    topic: "soc-suricata"
    encoding:
      codec: json

  kafka_zeek:
    type: kafka
    inputs:
      - parse_zeek
    bootstrap_servers: "kafka:29092"
    topic: "soc-zeek"
    encoding:
      codec: json

  opensearch_suricata:
    type: elasticsearch
    inputs:
      - parse_suricata
    endpoints:
      - "https://opensearch-node1:9200"
    auth:
      strategy: basic
      user: "${OPENSEARCH_USER:-admin}"
      password: "${OPENSEARCH_PASSWORD:-admin}"
    tls:
      verify_certificate: false
      verify_hostname: false
    bulk:
      index: "suricata-%Y.%m.%d"

  opensearch_zeek:
    type: elasticsearch
    inputs:
      - parse_zeek
    endpoints:
      - "https://opensearch-node1:9200"
    auth:
      strategy: basic
      user: "${OPENSEARCH_USER:-admin}"
      password: "${OPENSEARCH_PASSWORD:-admin}"
    tls:
      verify_certificate: false
      verify_hostname: false
    bulk:
      # Use dynamic indexing based on the Zeek log type (e.g., zeek-dns-2024.05.24)
      index: "zeek-{{ zeek_type }}-%Y.%m.%d"
